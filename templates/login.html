<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Tharun.Dev</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg); }
        .login-wrapper { width: 100%; max-width: 420px; padding: 24px; }
        .login-box { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 40px 36px; }
        .login-logo { font-family: var(--mono); font-size: 1rem; color: var(--cyan); letter-spacing: 2px; margin-bottom: 32px; text-align: center; }
        .login-title { font-size: 1.6rem; font-weight: 800; color: white; margin-bottom: 6px; text-align: center; }
        .login-sub { font-family: var(--mono); font-size: 0.65rem; color: var(--muted); letter-spacing: 2px; text-align: center; margin-bottom: 32px; }
        .login-back { display: block; text-align: center; margin-top: 24px; font-family: var(--mono); font-size: 0.65rem; color: var(--muted); letter-spacing: 1px; transition: color 0.2s; }
        .login-back:hover { color: var(--cyan); }
        :root { --bg: #040408; --bg2: #08080f; --card: #0c0c18; --border: rgba(255,255,255,0.07); --border-hover: rgba(0,229,255,0.3); --cyan: #00e5ff; --violet: #8b5cf6; --text: #e0e0f0; --muted: #7a7a9a; --mono: 'Space Mono', monospace; --sans: 'Syne', sans-serif; }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-box">
            <div class="login-logo">// THARUN.DEV</div>
            <div class="login-title">System Login</div>
            <div class="login-sub">ADMIN ACCESS ONLY</div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert {{ category }}" style="position:relative;top:auto;right:auto;margin-bottom:16px;animation:none;">
                            <span>{{ message }}</span>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="form-group" style="margin-bottom:16px;">
                    <label for="username" style="font-family:var(--mono);font-size:0.6rem;letter-spacing:2px;color:var(--muted);text-transform:uppercase;display:block;margin-bottom:6px;">Username</label>
                    <input type="text" id="username" name="username" placeholder="your@email.com" required autocomplete="username"
                           style="width:100%;background:rgba(255,255,255,0.03);border:1px solid var(--border);color:var(--text);padding:12px 16px;font-family:var(--sans);font-size:0.9rem;border-radius:6px;outline:none;transition:border-color 0.25s;"
                           onfocus="this.style.borderColor='rgba(0,229,255,0.4)'" onblur="this.style.borderColor='var(--border)'">
                </div>
                <div class="form-group" style="margin-bottom:24px;">
                    <label for="password" style="font-family:var(--mono);font-size:0.6rem;letter-spacing:2px;color:var(--muted);text-transform:uppercase;display:block;margin-bottom:6px;">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password"
                           style="width:100%;background:rgba(255,255,255,0.03);border:1px solid var(--border);color:var(--text);padding:12px 16px;font-family:var(--sans);font-size:0.9rem;border-radius:6px;outline:none;transition:border-color 0.25s;"
                           onfocus="this.style.borderColor='rgba(0,229,255,0.4)'" onblur="this.style.borderColor='var(--border)'">
                </div>
                <button type="submit" class="submit-btn" style="width:100%;padding:14px;background:linear-gradient(135deg,var(--violet),var(--cyan));border:none;color:#000;font-size:0.75rem;font-weight:700;letter-spacing:2px;border-radius:6px;cursor:pointer;font-family:var(--mono);transition:all 0.25s;">
                    ACCESS ADMIN PANEL &rarr;
                </button>
            </form>
            <a href="/" class="login-back">&larr; Back to Portfolio</a>
        </div>
    </div>
</body>
</html>
